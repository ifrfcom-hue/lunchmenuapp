function today() {
  var d = new Date();
  return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate());
}
function pad(n) { return n < 10 ? '0'+n : ''+n; }
function parseD(s) { var p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function fmtD(s) {
  var d = parseD(s), days=['мЭЉ','мЫФ','нЩФ','мИШ','л™©','кЄИ','нЖ†'];
  return (d.getMonth()+1)+'/'+d.getDate()+'('+days[d.getDay()]+')';
}
function weekOf(base) {
  var d = parseD(base), day = d.getDay();
  var mon = new Date(d); mon.setDate(d.getDate() - (day===0?6:day-1));
  var arr = [];
  for(var i=0;i<5;i++) {
    var dd = new Date(mon); dd.setDate(mon.getDate()+i);
    arr.push(dd.getFullYear()+'-'+pad(dd.getMonth()+1)+'-'+pad(dd.getDate()));
  }
  return arr;
}
function thisWeek() { return weekOf(today()); }
function nextWeek() {
  var d = new Date(); d.setDate(d.getDate()+7);
  return weekOf(d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()));
}
function nextWorkday() {
  var d = new Date(); d.setDate(d.getDate()+1);
  while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()+1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function isToday(s) { return s===today(); }
function isTomorrow(s) { return s===nextWorkday(); }
function thisMonth() { return today().slice(0,7); }
function lastWorkday(ym) {
  var p=ym.split('-'), d=new Date(+p[0],+p[1],0);
  while(d.getDay()===0||d.getDay()===6) d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

  document.getElementById('tab-admin-btn').onclick = function() {
    loginTab = 'admin';
    document.getElementById('tab-admin-btn').className = 'tab-btn on';
    document.getElementById('tab-user-btn').className  = 'tab-btn';
    document.getElementById('admin-fields').className  = '';
    document.getElementById('user-fields').className   = 'hidden';
    document.getElementById('login-err').style.display = 'none';
  };

  document.getElementById('tab-user-btn').onclick = function() {
    loginTab = 'user';
    document.getElementById('tab-admin-btn').className = 'tab-btn';
    document.getElementById('tab-user-btn').className  = 'tab-btn on';
    document.getElementById('admin-fields').className  = 'hidden';
    document.getElementById('user-fields').className   = '';
    document.getElementById('login-err').style.display = 'none';
    fillUserSel();
  };

  document.getElementById('do-login-btn').onclick = doLogin;

  document.getElementById('admin-pw').onkeydown = function(e) {
    if(e.keyCode===13) doLogin();
  };
  document.getElementById('user-pw').onkeydown = function(e) {
    if(e.keyCode===13) doLogin();
  };
}

function fillUserSel() {
  var sel = document.getElementById('user-sel');
  sel.innerHTML = '<option value="">-- мД†нГЭнХШмДЄмЪФ --</option>';
  for(var i=0;i<S.employees.length;i++) {
    var e = S.employees[i];
    var o = document.createElement('option');
    o.value = e.id;
    o.textContent = e.name + ' (' + e.dept + ')';
    sel.appendChild(o);
  }
}

function showErr(msg) {
  var el = document.getElementById('login-err');
  el.textContent = msg;
  el.style.display = 'block';
}

function doLogin() {
  document.getElementById('login-err').style.display = 'none';
  if(loginTab === 'admin') {
    var pw = document.getElementById('admin-pw').value;
    if(!pw) { showErr('лєДл∞Ал≤ИнШЄл•Љ мЮЕл†•нХі м£ЉмДЄмЪФ'); return; }
    if(pw !== S.adminPw) { showErr('лєДл∞Ал≤ИнШЄк∞А нЛАл†ЄмКµлЛИлЛ§'); return; }
    S.user = S.employees.find(function(e){ return e.role==='admin'; }) || { id:0, name:'кіАл¶ђмЮР', role:'admin', dept:'', pw:S.adminPw };
    S.mode = 'admin';
  } else {
    var id  = parseInt(document.getElementById('user-sel').value);
    var pw2 = document.getElementById('user-pw').value;
    if(!id)  { showErr('мЭіл¶ДмЭД мД†нГЭнХі м£ЉмДЄмЪФ'); return; }
    if(!pw2) { showErr('лєДл∞Ал≤ИнШЄл•Љ мЮЕл†•нХі м£ЉмДЄмЪФ'); return; }
    var emp = null;
    for(var i=0;i<S.employees.length;i++) {
      if(S.employees[i].id===id) { emp=S.employees[i]; break; }
    }
    if(!emp)        { showErr('мІБмЫР м†Хл≥іл•Љ м∞ЊмЭД мИШ мЧЖмКµлЛИлЛ§'); return; }
    if(emp.pw!==pw2){ showErr('лєДл∞Ал≤ИнШЄк∞А нЛАл†ЄмКµлЛИлЛ§'); return; }
    S.user = emp;
    S.mode = emp.role;
  }

  document.getElementById('page-login').style.display = 'none';
  document.getElementById('page-app').style.display   = 'block';
  document.getElementById('hd-name').textContent  = S.user.name;
  document.getElementById('hd-badge').textContent = S.mode==='admin' ? 'кіАл¶ђмЮР' : 'мІБмЫР';
  document.getElementById('hd-badge').className   = 'header-badge ' + (S.mode==='admin'?'badge-admin':'badge-user');
  window.scrollTo(0,0);
  S.tab = '';
  renderNav();
}

document.getElementById('do-logout-btn').onclick = function() {
  S.user = null;
  document.getElementById('page-app').style.display   = 'none';
  document.getElementById('page-login').style.display = 'flex';
  document.getElementById('admin-pw').value = '';
  document.getElementById('user-pw').value  = '';
  document.getElementById('login-err').style.display = 'none';
  S.tab = '';
};

function renderNav() {
  var tabs = S.mode==='admin' ? ADMIN_TABS : USER_TABS;
  if(!S.tab) S.tab = tabs[0].id;
  var nav = document.getElementById('nav-bar');
  nav.innerHTML = '';
  for(var i=0;i<tabs.length;i++) {
    (function(t){
      var btn = document.createElement('button');
      btn.className = 'nav-btn' + (S.tab===t.id?' on':'');
      btn.textContent = t.label;
      btn.onclick = function(){ S.tab=t.id; renderNav(); };
      nav.appendChild(btn);
    })(tabs[i]);
  }
  renderContent();
}

function renderContent() {

function quickOrder(date, choice) {
  if(!S.orders[date]) S.orders[date] = [];
  var found = false;
  for(var i=0;i<S.orders[date].length;i++) {
    if(S.orders[date][i].uid===S.user.id) {
      S.orders[date][i].choice=choice; found=true; break;
    }
  }
  if(!found) S.orders[date].push({ uid:S.user.id, choice:choice });
  save();
  var label = choice==='korean'?'нХЬмЛЭ':choice==='salad'?'мГРлЯђлУЬ':'лґИм∞Є';
  showToast(fmtD(date)+' '+label+' мД†нГЭ!', 'ok');
  renderContent();
}

function getChoice(date, uid) {
  var arr = S.orders[date]||[];
  for(var i=0;i<arr.length;i++) if(arr[i].uid===uid) return arr[i].choice;
  return '';
}

function chipClass(choice, type) {
  var base = type==='korean'?'chip chip-k':type==='salad'?'chip chip-s':'chip chip-n';
  return base + (choice===type?' sel':'');
}

function pageDash() {
  var tw=thisWeek(), nd=nextWorkday(), mo=thisMonth();
  var todayOrds=0, tmrOrds=0, moOrds=0;
  var t=today();
  var allDates=Object.keys(S.orders);
  for(var i=0;i<allDates.length;i++) {
    var d=allDates[i], arr=S.orders[d]||[];
    for(var j=0;j<arr.length;j++) {
      if(arr[j].choice==='none') continue;
      if(d===t)  todayOrds++;
      if(d===nd) tmrOrds++;
      if(d.slice(0,7)===mo) moOrds++;
    }
  }
  var html = '<div class="stats">';
  html += '<div class="stat"><div class="stat-num">'+S.employees.length+'</div><div class="stat-label">м†Дм≤і мІБмЫР</div></div>';
  html += '<div class="stat"><div class="stat-num">'+todayOrds+'</div><div class="stat-label">мШ§лКШ м£ЉлђЄ</div></div>';
  html += '<div class="stat"><div class="stat-num">'+tmrOrds+'</div><div class="stat-label">лВімЭЉ м£ЉлђЄ</div></div>';
  html += '<div class="stat"><div class="stat-num">'+(moOrds*7000).toLocaleString()+'мЫР</div><div class="stat-label">мЭіл≤И лЛђ мЛЭлМА</div></div>';
  html += '</div>';
  html += '<div class="card"><div class="card-title">рЯУЛ мЭіл≤И м£Љ нШДнЩ©</div>';
  html += '<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>мІБмЫР</th>';
  for(var i=0;i<tw.length;i++) html+='<th>'+fmtD(tw[i])+'</th>';
  html+='<th>мЖМк≥Д</th></tr></thead><tbody>';
  for(var ei=0;ei<S.employees.length;ei++) {
    var emp=S.employees[ei], cnt=0;
    html+='<tr><td><b>'+emp.name+'</b><br><span style="font-size:11px;color:#9ca3af">'+emp.dept+'</span></td>';
    for(var di=0;di<tw.length;di++) {
      var c=getChoice(tw[di],emp.id);
      if(c==='korean'){ cnt++; html+='<td style="color:#2563eb;font-weight:600">нХЬмЛЭ</td>'; }
      else if(c==='salad'){ cnt++; html+='<td style="color:#16a34a;font-weight:600">мГРлЯђлУЬ</td>'; }
      else if(c==='none') html+='<td style="color:#9ca3af">лґИм∞Є</td>';
      else html+='<td style="color:#d1d5db">-</td>';
    }
    html+='<td><b>'+cnt+'мЛЭ</b></td></tr>';
  }
  html+='</tbody></table></div></div>';
  return html;
}

function saveMiniGrid(key) {
  var days=key==='this'?thisWeek():nextWeek();
  for(var i=0;i<days.length;i++) {
    var ki=document.getElementById('mg-k-'+key+'-'+i);
    var si=document.getElementById('mg-s-'+key+'-'+i);
    if(!S.menus[days[i]]) S.menus[days[i]]={};
    if(ki) S.menus[days[i]].korean=ki.value.trim();
    if(si) S.menus[days[i]].salad=si.value.trim();
  }
  save(); showToast('мЛЭлЛ®мЭі м†АмЮ•лРРмКµлЛИлЛ§','ok');
}

  var tw=thisWeek(), nw=nextWeek();

function delImg(key) {
  if(key==='this') S.imgThis=null; else S.imgNext=null;
  save(); renderContent();
}

function uploadImg(e, key) {
  var file=e.target.files[0]; if(!file) return;
  e.target.value='';
  var reader=new FileReader();
  reader.onload=function(ev) {
    if(key==='this') S.imgThis=ev.target.result;
    else S.imgNext=ev.target.result;
    save();
    renderContent();
    showToast((key==='this'?'мЭіл≤И м£Љ':'лЛ§мЭМ м£Љ')+' мВђмІДмЭі лУ±л°ЭлРРмКµлЛИлЛ§', 'ok');
  };
  reader.readAsDataURL(file);
}

function pageOrders() {
  var weeks=[{label:'мЭіл≤И м£Љ',days:thisWeek()},{label:'лЛ§мЭМ м£Љ',days:nextWeek()}];
  var html='';
  for(var wi=0;wi<weeks.length;wi++) {
    html+='<div class="card"><div class="card-title">рЯУ¶ '+weeks[wi].label+' м£ЉлђЄ нШДнЩ©</div>';
    var days=weeks[wi].days;
    html+='<div style="overflow-x:auto"><table class="tbl"><thead><tr><th>лВ†мІЬ</th><th style="text-align:center">міЭ</th><th style="text-align:center;color:#2563eb">нХЬмЛЭ</th><th style="text-align:center;color:#16a34a">мГРлЯђлУЬ</th><th style="text-align:center;color:#9ca3af">лґИм∞Є</th><th>мЛ†м≤≠мЮР</th></tr></thead><tbody>';
    for(var di=0;di<days.length;di++) {
      var d=days[di], arr=S.orders[d]||[];
      var k=0,s=0,n=0,names='';
      for(var i=0;i<arr.length;i++) {
        var emp=findEmp(arr[i].uid);
        if(arr[i].choice==='korean'){ k++; if(emp) names+='<span style="display:inline-block;margin:2px;padding:2px 7px;background:#eff6ff;border-radius:10px;font-size:11px;color:#1d4ed8">'+emp.name+'</span>'; }
        else if(arr[i].choice==='salad'){ s++; if(emp) names+='<span style="display:inline-block;margin:2px;padding:2px 7px;background:#f0fdf4;border-radius:10px;font-size:11px;color:#15803d">'+emp.name+'рЯ•Ч</span>'; }
        else if(arr[i].choice==='none') n++;
      }
      var rowBg=isToday(d)?'background:#fffbeb':isTomorrow(d)?'background:#eff6ff':'';
      html+='<tr style="'+rowBg+'">';
      html+='<td><b>'+fmtD(d)+'</b>'+(isToday(d)?'<span style="font-size:10px;background:#fef9c3;color:#854d0e;padding:1px 5px;border-radius:8px;margin-left:4px">мШ§лКШ</span>':isTomorrow(d)?'<span style="font-size:10px;background:#dbeafe;color:#1d4ed8;padding:1px 5px;border-radius:8px;margin-left:4px">лВімЭЉ</span>':'')+'</td>';
      html+='<td style="text-align:center;font-weight:700">'+(k+s)+'</td>';
      html+='<td style="text-align:center;color:#2563eb;font-weight:700">'+k+'</td>';
      html+='<td style="text-align:center;color:#16a34a;font-weight:700">'+s+'</td>';
      html+='<td style="text-align:center;color:#9ca3af">'+n+'</td>';
      html+='<td>'+(names||'<span style="color:#d1d5db;font-size:12px">мЧЖмЭМ</span>')+'</td>';
      html+='</tr>';
    }
    html+='</tbody></table></div></div>';
  }
  return html;
}

function findEmp(id) {
  for(var i=0;i<S.employees.length;i++) if(S.employees[i].id===id) return S.employees[i];
  return null;
}

function pageMonthly() {
  var months=[];

      if(m.salad)  html+='<div class="menu-type">мГРлЯђлУЬ</div><div class="menu-val salad">'+m.salad+'</div>';
      if(!m.korean&&!m.salad) html+='<div style="font-size:11px;color:#d1d5db">лѓЄлУ±л°Э</div>';
      html+='</div></div>';
    }
    html+='</div></div>';
    if(wi<weeks.length-1) html+='<hr style="border:none;border-top:1px solid #e5e7eb;margin:4px 0 20px">';
  }
  html+='</div>';
  return html;
}

function pageMyOrder() {
  var nd=nextWorkday();
  var html='<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
  html+='<div class="card-title" style="margin-bottom:0">вЬЕ мЛЭмВђ мЛ†м≤≠</div>';
  html+='<span class="deadline">лІ§мЭЉ мШ§нЫД 5мЛЬ лІИк∞Р</span></div>';
  html+='<div class="info-box">лВімЭЉ('+fmtD(nd)+') мЛЭмВђ мЛ†м≤≠мЭі мШ§лКШ мШ§нЫД 5мЛЬ лІИк∞РмЮЕлЛИлЛ§.</div>';

  var weeks=[{label:'мЭіл≤И м£Љ',days:thisWeek()},{label:'лЛ§мЭМ м£Љ',days:nextWeek()}];
  for(var wi=0;wi<weeks.length;wi++) {
    html+='<div class="week-label">'+weeks[wi].label+'</div>';
    var days=weeks[wi].days;
    for(var di=0;di<days.length;di++) {
      var d=days[di], m=S.menus[d]||{}, c=getChoice(d,S.user.id);
      html+='<div class="order-row'+(c&&c!=='none'?' done':'')+'"><div class="order-date">'+fmtD(d)+(isToday(d)?'  рЯФµ':isTomorrow(d)?'  вП∞':'')+'</div>';
      if(m.korean||m.salad) html+='<div class="order-menu">рЯНЪ '+(m.korean||'')+' / рЯ•Ч '+(m.salad||'')+'</div>';
      html+='<div class="order-btns">';
      html+='<button class="obtn'+(c==='none'?' sel-none':'')+'" onclick="quickOrder(\''+d+'\',\'none\')">лґИм∞Є</button>';
      html+='<button class="obtn'+(c==='korean'?' sel-korean':'')+'" onclick="quickOrder(\''+d+'\',\'korean\')">рЯНЪ нХЬмЛЭ</button>';
      html+='<button class="obtn'+(c==='salad'?' sel-salad':'')+'" onclick="quickOrder(\''+d+'\',\'salad\')">рЯ•Ч мГРлЯђлУЬ</button>';
      html+='</div></div>';
    }
  }
  html+='</div>';
  return html;
}

//  мІБмЫР вАФ лВі м†ХмВ∞

function pageMySettle() {
  var mo=thisMonth(), lw=lastWorkday(mo), acc=S.account, cnt=0;
  var allD=Object.keys(S.orders);
  for(var i=0;i<allD.length;i++) {
    if(allD[i].slice(0,7)!==mo) continue;
    var c=getChoice(allD[i],S.user.id);
    if(c==='korean'||c==='salad') cnt++;
  }
  var html='<div class="card"><div class="card-title">рЯТ∞ лВі мЛЭлМА м†ХмВ∞ ('+mo+')</div>';
  html+='<div class="stats"><div class="stat"><div class="stat-num">'+cnt+'</div><div class="stat-label">мЭіл≤И лЛђ м£ЉлђЄ</div></div>';
  html+='<div class="stat"><div class="stat-num" style="color:#dc2626;font-size:20px">'+(cnt*7000).toLocaleString()+'мЫР</div><div class="stat-label">лВ©лґА кЄИмХ°</div></div></div>';
  if(acc.holder) {
    html+='<div style="padding:14px;background:#fef9c3;border:1px solid #fbbf24;border-radius:8px;font-size:13px;color:#92400e;line-height:1.8">';
    html+='рЯТ≥ <b>м†ХмВ∞ к≥ДмҐМ</b><br>мШИкЄИм£Љ: '+acc.holder+' | '+acc.bank+'<br>к≥ДмҐМл≤ИнШЄ: <b>'+acc.num+'</b><br>лВ©лґАкЄ∞нХЬ: '+fmtD(lw)+'</div>';
  }
  html+='<div style="margin-top:14px"><table class="tbl"><thead><tr><th>лВ†мІЬ</th><th>мД†нГЭ</th><th style="text-align:right">кЄИмХ°</th></tr></thead><tbody>';
  var rows=[];
  for(var i=0;i<allD.length;i++) {
    if(allD[i].slice(0,7)!==mo) continue;
    var c=getChoice(allD[i],S.user.id);
    if(c==='korean'||c==='salad') rows.push({d:allD[i],c:c});
  }
  rows.sort(function(a,b){return a.d<b.d?-1:1;});
  for(var i=0;i<rows.length;i++) {
    html+='<tr><td>'+fmtD(rows[i].d)+'</td><td>'+(rows[i].c==='korean'?'нХЬмЛЭ':'мГРлЯђлУЬ')+'</td><td style="text-align:right" class="amt">7,000мЫР</td></tr>';
  }
  if(!rows.length) html+='<tr><td colspan="3" style="text-align:center;color:#9ca3af;padding:16px">лВімЧ≠ мЧЖмЭМ</td></tr>';
  html+='</tbody></table></div></div>';
  return html;
}

function openModal(id) {
  document.getElementById(id).className='modal-bg show';
  if(id==='modal-acc') {
    document.getElementById('a-holder').value=S.account.holder||'';
    document.getElementById('a-bank').value=S.account.bank||'';
    document.getElementById('a-num').value=S.account.num||'';
  }
  if(id==='modal-emp') {
    document.getElementById('m-name').value='';
    document.getElementById('m-dept').value='';
    document.getElementById('m-pw').value='';
  }
}
function closeModal() {
  document.querySelectorAll('.modal-bg').forEach(function(el){ el.className='modal-bg'; });
}

// ================================================
//  PWA вАФ мД§мєШ л≤ДнКЉ + мДЬлєДмК§мЫМмї§
// ================================================
(function() {
  /* мД§мєШ л∞∞лДИ к≥µнЖµ мГЭмД± */
  function makeBar(html, clickFn) {
    var bar = document.createElement('button');
    bar.className = 'install-bar show';
    bar.innerHTML = html;
    document.body.appendChild(bar);
    bar.querySelector('.ib-close').onclick = function(e) {
      e.stopPropagation();
      bar.remove();
    };
    bar.onclick = function(e) {
      if (e.target.classList.contains('ib-close')) return;
      if (clickFn) clickFn();
    };
    return bar;
  }

  /* PC/мХИлУЬл°ЬмЭілУЬ Chrome мД§мєШ нФДл°ђнФДнКЄ */
  var deferredPrompt = null;
  window.addEventListener('beforeinstallprompt', function(e) {
    e.preventDefault();
    deferredPrompt = e;
    var bar = makeBar(
      '<span style="font-size:18px">рЯН±</span><span>мХ±мЬЉл°Ь мД§мєШнХШкЄ∞</span><button class="ib-close" aria-label="лЛЂкЄ∞">x</button>',
      function() {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(function() {
          deferredPrompt = null;
          bar.remove();
        });
      }
    );
  });

  /* iOS Safari мХИлВі л∞∞лДИ */
  var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var isStandalone = window.navigator.standalone === true;
  if (isIOS && !isStandalone) {
    setTimeout(function() {
      makeBar(
        '<span style="font-size:18px">рЯН±</span><div style="line-height:1.4"><div style="font-size:13px">нЩИ нЩФл©імЧР мґФк∞А</div><div style="font-size:11px;opacity:.85">нХШлЛ® к≥µмЬ†л≤ДнКЉ нГ≠нЫД нЩИ нЩФл©імЧР мґФк∞А мД†нГЭ</div></div><button class="ib-close" aria-label="лЛЂкЄ∞">x</button>',
        null
      );
    }, 2000);
  }

  /* Service Worker */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js', { scope: './' }).catch(function() {});
  }
})();
</script>
